  <!-- eyes (determined) -->
  <path d="M23 27 L29 29" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/>
  <path d="M45 27 L39 29" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/>
  <circle cx="26.5" cy="31" r="2.5" fill="#4E342E"/>
  <circle cx="41.5" cy="31" r="2.5" fill="#4E342E"/>
  <circle cx="27.3" cy="30.2" r="0.85" fill="#FFFFFF"/>
  <circle cx="42.3" cy="30.2" r="0.85" fill="#FFFFFF"/>
  <!-- cheeks -->
  <ellipse cx="20" cy="37.5" rx="3.2" ry="2" fill="#FF8A65" opacity="0.7"/>
  <ellipse cx="48" cy="37.5" rx="3.2" ry="2" fill="#FF8A65" opacity="0.7"/>
