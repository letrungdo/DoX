  <g stroke-linecap="round" fill="none">
    <path d="M13 32 Q2 26 4 14" stroke="#26A69A" stroke-width="5"/>
    <path d="M14 27 Q7 18 12 8" stroke="#66BB6A" stroke-width="5"/>
    <path d="M17 23 Q14 13 20 6" stroke="#FFA726" stroke-width="5"/>
  </g>
  <!-- comb -->
  <path d="M26 15 Q23 4 31 4 Q30 9 33 10 Q33 2 40 3 Q38 8 41 10 Q45 6 49 10 Q45 12 45 16 Z" fill="#E53935"/>
  <!-- body -->
  <circle cx="34" cy="37" r="20" fill="#FFE0B2" stroke="#FFCC80" stroke-width="2"/>
  <ellipse cx="34" cy="47" rx="12.5" ry="7.5" fill="#FFECC7"/>
  <!-- wings -->
  <ellipse cx="15" cy="40" rx="4.2" ry="7.2" fill="#FFCC80" transform="rotate(14 15 40)"/>
  <ellipse cx="53" cy="40" rx="4.2" ry="7.2" fill="#FFCC80" transform="rotate(-14 53 40)"/>
  <!-- beak -->
  <path d="M29.5 34.5 L34 40 L38.5 34.5 Q34 31.5 29.5 34.5 Z" fill="#FB8C00"/>
  <!-- wattle -->
